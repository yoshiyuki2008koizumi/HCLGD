<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HCLGD</title>

<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/png" sizes="32x32" href="icon32.png">
<link rel="icon" type="image/png" sizes="128x128" href="icon128.png">
<link rel="apple-touch-icon" href="icon128.png">
</head>

<body>
<!-- DOM -->
<button id="reloadBtn">再起動</button>           <!-- Top -->
<button id="btnOld">旧アプリを表示</button>
<select id="btnHide">
  <option value="block">表示</option>
  <option value="none">非表示</option>
</select>
<button id="docBtn">スマホ初回起動</button>

<span id="dbgBtn"></span>       <!-- 子ページデバッグボタン -->
<h1 id="title">HCLGDV</h1>              <!-- タイトル -->
<div id="upDbgContent"></div>           <!-- 上部デバッグボタン -->
<h3 id="childTitle">chile title</h3>    <!-- 子タイトル -->
<div id="childChgMsg"></div>              <!-- 子ページ切り替え中表示 -->
<div id="childContent"></div>             <!-- 子ページの表示エリア -->
<h3 id="errDisp"></h3>                    <!-- エラー表示 -->
<iframe 
  id="oldApp"
  style="width:100%; height:80vh; border:1px solid #999; display:none;"
></iframe>                                <!-- OLDの表示 -->

<!-- error -->
<div id="errorBox"></div>
<h3 id="errDisp"></h3>    <!-- エラー表示 -->

 <!-- EMSモジュール -->
<script type="module" src="global.js"></script>
<script type="module" src="start.js?V=2"></script>
</body>
